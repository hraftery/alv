services:

  # Do not add traffic to the historical logs.
  traffic-gen:
    profiles:
      - disabled

  nginx:
    entrypoint:
      - /bin/sh
      - -c
      - >-
        rm -f /var/log/nginx/* &&
        cp /seed/historical_access.log /var/log/nginx/access.log &&
        cp /seed/historical_error.log /var/log/nginx/error.log &&
        exec nginx -g 'daemon off;'
