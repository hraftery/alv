include:
  - ../compose.yml

services:
  alloy:
    # Expose the debug port and set addr to 0.0.0.0 so it can be accessed from outside docker.
    ports:
      - "12345:12345"
    # Entrypoint so we can insert a delay to give nginx time to set up the log files.
    entrypoint: ["/bin/sh", "-c", "sleep 2 && exec alloy run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy"]
    # Note this will shadow the /var/log/nginx mounts set in the base compose.yml file.
    volumes:
      - nginx-logs:/var/log/nginx:ro

  log-init:
    # Create the initial access.log and error.log files so the database is seeded with entries.
    # Also create the historical log files based on the rotated log files so the "first_time_setup"
    # step can be tested. Note the location is seed/ instead of /tmp to save mounting the host's
    # tmp directory. The only impact is that the prefix to run "first_time_setup" is
    # HISTORICAL_LOG=./test/seed/historical_access.log instead of
    # HISTORICAL_LOG=/tmp/historical_access.log
    image: python:3-alpine
    working_dir: /app
    command: sh -c "
      { [ -f seed/access.log ] || python3 generate_access_logs.py; } &&
      { [ -f seed/initial_error.log ] || python3 generate_error_logs.py -o seed/initial_error.log; } &&
      { [ -f seed/historical_access.log ] || { ls -tr seed/access.log.*.gz 2>/dev/null | xargs zcat; cat seed/access.log.1 2>/dev/null; } > seed/historical_access.log; }"
    volumes:
      - ./:/app

  nginx:
    image: nginx:latest
    # Remove the pre-wired access.log --> STDOUT and error.log --> STDERR
    # symbolic links, then pre-populate from seed files.
    entrypoint:
      - /bin/sh
      - -c
      - >-
        rm -f /var/log/nginx/* &&
        cp /seed/access.log* /var/log/nginx/ &&
        cp /seed/initial_error.log /var/log/nginx/error.log &&
        exec nginx -g 'daemon off;'
    depends_on:
      log-init:
        condition: service_completed_successfully
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./seed:/seed:ro
      - nginx-logs:/var/log/nginx

  grafana:
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true

  traffic-gen:
    image: alpine:latest
    command: sh -c "while true; do wget -q -O /dev/null http://nginx/; sleep 1; done"
    depends_on:
      - nginx

volumes:
  nginx-logs:
