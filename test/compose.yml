include:
  - ../compose.yml

services:
  alloy:
    # Expose the debug port and set addr to 0.0.0.0 so it can be accessed from outside docker.
    ports:
      - "12345:12345"
    # Entrypoint so we can insert a delay to give nginx time to set up the log files.
    entrypoint: ["/bin/sh", "-c", "sleep 2 && exec alloy run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy"]
    volumes:
      - nginx-logs:/var/log/nginx:ro

  log-init:
    image: python:3-alpine
    working_dir: /seed
    command: sh -c "[ -f initial_access.log ] || python3 generate_logs.py"
    volumes:
      - ./:/seed

  nginx:
    image: nginx:latest
    # Remove the pre-wired access.log --> STDOUT and error.log --> STDERR
    # symbolic links, then pre-populate from initial_access.log.
    entrypoint: ["/bin/sh", "-c", "rm -f /var/log/nginx/* && cp /seed/initial_access.log /var/log/nginx/access.log && exec nginx -g 'daemon off;'"]
    depends_on:
      log-init:
        condition: service_completed_successfully
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/seed:ro
      - nginx-logs:/var/log/nginx

  grafana:
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true

  traffic-gen:
    image: alpine:latest
    command: sh -c "while true; do wget -q -O /dev/null http://nginx/; sleep 1; done"
    depends_on:
      - nginx

volumes:
  nginx-logs:
