include:
  - ../compose.yml

services:
  alloy:
    # Expose the debug port and set addr to 0.0.0.0 so it can be accessed from outside docker.
    ports:
      - "12345:12345"
    # Entrypoint so we can insert a delay to give nginx time to set up the log files.
    entrypoint: ["/bin/sh", "-c", "sleep 2 && exec alloy run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy"]
    # Note these will shadow the /var/log/nginx and GeoLite2-City.mmdb mounts set in the
    # base compose.yml file. The base file assumes the host has active nginx logs and a
    # full GeoIP database downloaded to use. For test, we provide (generated) dummy logs
    # and a test database (from Apache-2.0 licensed https://github.com/maxmind/MaxMind-DB)
    # so no MaxMind account is needed to run the test environment.
    volumes:
      - nginx-logs:/var/log/nginx:ro
      - ../alloy/GeoLite2-City-Test.mmdb:/etc/alloy/GeoLite2-City.mmdb:ro

  log-init:
    # Create the initial access.log and error.log files so the database can be seeded with
    # entries. Also create the historical log files based on the rotated log files so the
    # "Ingest History" feature can be tested. Note the output is put in seed/ instead of
    # /tmp as in production. This saves having to mount the host's tmp directory.
    image: python:3-alpine
    working_dir: /app
    command: sh -c "
      { [ -f seed/access.log ] || python3 generate_access_logs.py; } &&
      { [ -f seed/error.log ] || python3 generate_error_logs.py; } &&
      { [ -f seed/historical_access.log ] || { ls -tr seed/access.log.*.gz 2>/dev/null | xargs zcat; cat seed/access.log.1 2>/dev/null; } > seed/historical_access.log; } &&
      { [ -f seed/historical_error.log ] || { ls -tr seed/error.log.*.gz 2>/dev/null | xargs zcat; cat seed/error.log.1 2>/dev/null; } > seed/historical_error.log; }"
    volumes:
      - ./:/app

  nginx:
    image: nginx:latest
    # Remove the pre-wired access.log --> STDOUT and error.log --> STDERR
    # symbolic links, then pre-populate from seed files.
    entrypoint:
      - /bin/sh
      - -c
      - >-
        rm -f /var/log/nginx/* &&
        cp /seed/access.log* /var/log/nginx/ &&
        cp /seed/error.log* /var/log/nginx/ &&
        exec nginx -g 'daemon off;'
    depends_on:
      log-init:
        condition: service_completed_successfully
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./seed:/seed:ro
      - nginx-logs:/var/log/nginx

  grafana:
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true

  traffic-gen:
    image: alpine:latest
    command: sh -c "while true; do wget -q -O /dev/null http://nginx/; sleep 1; done"
    depends_on:
      - nginx

volumes:
  nginx-logs:
