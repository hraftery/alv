name: Deploy

on:
  push:
    branches:
      - deploy
  workflow_dispatch:
    inputs:
      ingest_history:
        description: Ingest the historical log files instead of tailing the live ones.
        type: boolean
        default: false

# This workflow only copies the files to the server and runs alv.sh there, so
# automated deployments and manual clones share one code path. See alv.sh for
# the actual deployment logic.

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_USER: alv
      DEPLOY_PATH: /opt/alv

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Determine version
        # The synced files exclude .git, so alv.sh can't derive the version on the server.
        # Determine it here in the runner instead, where .git exists, and add it to our env
        # so we can pass it through via the "Run alv.sh on the server" step.
        run: |
          echo "ALV_VERSION=$(./alv.sh version)" >> "$GITHUB_ENV"

      - name: Write SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_deploy
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          echo "${{ secrets.DEPLOY_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files
        # .env is server-side state, so protect it from --delete.
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='test/' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            . \
            ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}

      - name: Run alv.sh on the server
        # "ingest-history" seeds the database from rotated logs; "up" starts or
        # restarts the live services. The MaxMind credentials are optional — without
        # them alv.sh falls back to a bundled test database (see alv.sh _ensure_geodb).
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ALV_VERSION='${{ env.ALV_VERSION }}' \
             MAXMIND_ACCOUNT_ID='${{ secrets.MAXMIND_ACCOUNT_ID }}' \
             MAXMIND_LICENSE_KEY='${{ secrets.MAXMIND_LICENSE_KEY }}' \
             ./alv.sh ${{ inputs.ingest_history && 'ingest-history' || 'up' }}"
