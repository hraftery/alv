services:
  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - ./alloy/GeoLite2-City.mmdb:/etc/alloy/GeoLite2-City.mmdb:ro
      - /var/log/nginx:/var/log/nginx:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - victorialogs

  victorialogs:
    image: victoriametrics/victoria-logs:v1.24.0-victorialogs
    ports:
      - "127.0.0.1:9428:9428"
    volumes:
      - victorialogs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=90d

  grafana:
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_PLUGIN_BACKGROUND_INSTALLER_ENABLED=false
      # Could use a custom Dockerfile with `grafana cli plugins install`, but the env var
      # option is simpler and saves having to maintain our own image. The downside is running
      # an install on init. Either way, GF_PLUGIN_BACKGROUND_INSTALLER_ENABLED applies, and
      # the residual errors about failing to update "plugins-bundled/elasticsearch" remain.
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - victorialogs

volumes:
  victorialogs-data:
  grafana-data:
