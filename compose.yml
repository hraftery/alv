services:
  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - ./alloy/GeoLite2-City.mmdb:/etc/alloy/GeoLite2-City.mmdb:ro
      - /var/log/nginx:/var/log/nginx:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.7.3
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml

  victorialogs:
    image: victoriametrics/victoria-logs:v1.24.0-victorialogs
    ports:
      - "127.0.0.1:9428:9428"
    volumes:
      - victorialogs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=90d   # mirrors reject_old_samples_max_age in loki/config.yml

  grafana:
    build: ./grafana
    ports:
      - "3000:3000"
    environment:
      - GF_PLUGIN_BACKGROUND_INSTALLER_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  loki-data:
  victorialogs-data:
  grafana-data:
