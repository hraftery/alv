services:
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - nginx-logs:/var/log/nginx:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

  nginx:
    image: nginx:latest
    profiles: [test]
    # Remove the pre-wired access.log --> STDOUT and
    # error.log --> STDERR links and let nginx recreate them.
    entrypoint: ["/bin/sh", "-c", "rm -f /var/log/nginx/* && exec nginx -g 'daemon off;'"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx

  traffic-gen:
    image: alpine:latest
    profiles: [test]
    command: sh -c "while true; do wget -q -O /dev/null http://nginx/; sleep 1; done"
    depends_on:
      - nginx

volumes:
  loki-data:
  grafana-data:
  nginx-logs:
