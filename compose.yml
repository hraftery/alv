services:
  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - ./alloy/GeoLite2-City.mmdb:/etc/alloy/GeoLite2-City.mmdb:ro
      - /var/log/nginx:/var/log/nginx:ro
      # Override access.log for historical import. Shadows the directory mount above.
      # Usage: HISTORICAL_LOG=/tmp/historical_access.log docker compose run --rm alloy
      - ${HISTORICAL_LOG:-/var/log/nginx/access.log}:/var/log/nginx/access.log:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.7.3
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml

  grafana:
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_PLUGIN_BACKGROUND_INSTALLER_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  loki-data:
  grafana-data:
